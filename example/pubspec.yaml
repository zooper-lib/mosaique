name: mosaique_example
description: Example application demonstrating Mosaique usage
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Mosaique package (local path dependency)
  mosaique:
    path: ../
  
  # go_router for routing
  go_router: ^14.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
